name: Cross-Platform Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Lint & Test ───
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  # ─── Build Web Frontend ───
  build-web:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build:web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  # ─── Build Backend ───
  build-api:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build:api
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: services/api/dist/

  # ─── Windows .exe ───
  build-windows:
    runs-on: windows-latest
    needs: [build-web, build-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: services/api/dist/
      - run: cd apps/desktop && npm install
      - run: cd apps/desktop && npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist/*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: apps/desktop/dist/*portable*.exe

  # ─── macOS .dmg ───
  build-macos:
    runs-on: macos-latest
    needs: [build-web, build-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: services/api/dist/
      - run: cd apps/desktop && npm install
      - run: cd apps/desktop && npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/dist/*.dmg

  # ─── Linux .AppImage ───
  build-linux:
    runs-on: ubuntu-latest
    needs: [build-web, build-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: services/api/dist/
      - run: cd apps/desktop && npm install
      - run: cd apps/desktop && npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop/dist/*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: apps/desktop/dist/*.deb

  # ─── GitHub Release ───
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
