version: '3.8'

services:
  # PostgreSQL with pgvector extension
  db:
    image: ankane/pgvector:latest
    container_name: citemind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: citemind
      POSTGRES_PASSWORD: citemind_password
      POSTGRES_DB: citemind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citemind -d citemind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, and queues
  redis:
    image: redis:7-alpine
    container_name: citemind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: citemind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: citemind
      MINIO_ROOT_PASSWORD: citemind_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: citemind-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://citemind:citemind_password@db:5432/citemind
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 100
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: citemind
      S3_SECRET_KEY: citemind_secret_key
      S3_BUCKET: citemind-uploads
    ports:
      - "3000:3000"
    volumes:
      - ./services/api:/app
      - /app/node_modules
      - api-uploads:/app/uploads
    command: npm run dev

  # Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: citemind-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

  # AI Worker (background job processor)
  worker:
    build:
      context: ./packages/ai
      dockerfile: Dockerfile
    container_name: citemind-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://citemind:citemind_password@db:5432/citemind
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
    volumes:
      - ./packages/ai:/app
      - /app/node_modules
    command: npm run worker:dev

volumes:
  pgdata:
  redisdata:
  miniodata:
  api-uploads:

networks:
  default:
    name: citemind-network
